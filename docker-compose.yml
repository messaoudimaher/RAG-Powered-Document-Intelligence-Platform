version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: cogniflow_backend
    ports:
      - "8000:8000"
    volumes:
      - ./backend/data:/app/data
    environment:
      - SEED_SAMPLE_DOCS=true
      - OLLAMA_BASE_URL=http://ollama:11434
      - RELEVANCE_THRESHOLD=0.35
      - API_KEY=
      - GEMINI_API_KEY=
      - CHROMA_SERVER_HOST=chromadb
      - CHROMA_SERVER_PORT=8000
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      - chromadb
      - ollama
      - redis
    restart: unless-stopped

  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: cogniflow_worker
    volumes:
      - ./backend/data:/app/data
    environment:
      - SEED_SAMPLE_DOCS=true
      - OLLAMA_BASE_URL=http://ollama:11434
      - RELEVANCE_THRESHOLD=0.35
      - API_KEY=
      - GEMINI_API_KEY=
      - CHROMA_SERVER_HOST=chromadb
      - CHROMA_SERVER_PORT=8000
      - REDIS_URL=redis://redis:6379/0
    command: celery -A app.celery_app.celery_app worker --loglevel=info
    depends_on:
      - redis
      - chromadb
      - ollama
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: cogniflow_frontend
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000
    depends_on:
      - backend
    restart: unless-stopped

  streamlit:
    build:
      context: ./streamlit_client
      dockerfile: Dockerfile
    container_name: cogniflow_streamlit
    ports:
      - "8501:8501"
    environment:
      - BACKEND_API_URL=http://backend:8000
    depends_on:
      - backend
    restart: unless-stopped

  chromadb:
    image: chromadb/chroma:0.6.3
    container_name: cogniflow_chromadb
    ports:
      - "8001:8000"
    volumes:
      - ./backend/data/chromadb_server:/chroma/data
    environment:
      - IS_PERSISTENT=TRUE
      - ANONYMIZED_TELEMETRY=FALSE
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: cogniflow_redis
    ports:
      - "6379:6379"
    restart: unless-stopped

  ollama:
    image: ollama/ollama:0.1.48
    container_name: cogniflow_ollama
    ports:
      - "11434:11434"
    volumes:
      - ./backend/data/ollama:/root/.ollama
    restart: unless-stopped

  ollama-setup:
    image: ollama/ollama:0.1.48
    container_name: cogniflow_ollama_setup
    depends_on:
      - ollama
    environment:
      - OLLAMA_HOST=http://ollama:11434
    entrypoint: [ "/bin/sh", "-c" ]
    command: >
      "
      echo 'Waiting for Ollama service...' &&
      until curl -s http://ollama:11434/api/tags > /dev/null; do sleep 2; done &&
      echo 'Pulling nomic-embed-text model...' &&
      ollama pull nomic-embed-text &&
      echo 'Pulling llama3.2 model...' &&
      ollama pull llama3.2 &&
      echo 'Models initialization complete!'
      "
