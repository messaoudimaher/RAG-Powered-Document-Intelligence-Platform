version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: cogniflow_backend
    ports:
      - "8000:8000"
    volumes:
      - ./backend/data:/app/data
    environment:
      - SEED_SAMPLE_DOCS=true
      - OLLAMA_BASE_URL=http://host.docker.internal:11434
      - RELEVANCE_THRESHOLD=0.35
      - API_KEY=
      - GEMINI_API_KEY=
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: cogniflow_frontend
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000
    depends_on:
      - backend
    restart: unless-stopped

  streamlit:
    build:
      context: ./streamlit_client
      dockerfile: Dockerfile
    container_name: cogniflow_streamlit
    ports:
      - "8501:8501"
    environment:
      - BACKEND_API_URL=http://backend:8000
    depends_on:
      - backend
    restart: unless-stopped
